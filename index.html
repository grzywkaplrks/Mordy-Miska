<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mordy Miśka - Oprogramowanie</title>
    <link rel="icon" type="image/png" href="images/favicon.png">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f8f9fa;
            --navbar-bg: rgba(248, 249, 250, 0.4);
            --mobile-menu-bg: rgba(248, 249, 250, 0.95);
            --text-main: #1a1a1a;
            --text-muted: #5f6368;
            --primary-btn-bg: #388e84;
            --primary-btn-text: #ffffff;
            --secondary-btn-bg: transparent;
            --secondary-btn-text: #388e84;
            --secondary-btn-border: rgba(56, 142, 132, 0.3);
            --bg-gradient: radial-gradient(circle, rgba(142,228,255,0.4) 0%, rgba(206,177,255,0.3) 40%, rgba(248,249,250,0) 70%);
            --logo-color: #1a1a1a;
            --logo-accent: #388e84;
            --card-bg: #ffffff;
            --card-border: rgba(0, 0, 0, 0.08);
            --card-hover-border: rgba(56, 142, 132, 0.5);
            --footer-border: rgba(0, 0, 0, 0.1);
            --sponsor-bg: #e9ecef;
        }

        body.dark-mode {
            --bg-color: #0d1117;
            --navbar-bg: rgba(13, 17, 23, 0.4);
            --mobile-menu-bg: rgba(13, 17, 23, 0.98);
            --text-main: #e6edf3;
            --text-muted: #8b949e;
            --primary-btn-bg: #3ac6bd;
            --primary-btn-text: #0d1117;
            --secondary-btn-bg: rgba(58, 198, 189, 0.1);
            --secondary-btn-text: #3ac6bd;
            --secondary-btn-border: rgba(58, 198, 189, 0.3);
            --bg-gradient: radial-gradient(circle at 50% 20%, rgba(34, 52, 69, 0.6) 0%, rgba(13, 17, 23, 1) 70%);
            --logo-color: #e6edf3;
            --logo-accent: #3ac6bd;
            --card-bg: #161b22;
            --card-border: rgba(255, 255, 255, 0.05);
            --card-hover-border: rgba(58, 198, 189, 0.4);
            --footer-border: rgba(255, 255, 255, 0.1);
            --sponsor-bg: #161b22;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }

        .background-blur {
            position: absolute; top: 0; left: 0; width: 100%; height: 1000px;
            background: var(--bg-gradient);
            filter: blur(100px); z-index: -1; pointer-events: none;
            transition: background 0.3s;
        }

        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1.25rem 5%;
            width: 100%;
            position: fixed; top: 0; left: 0; right: 0;
            background-color: var(--navbar-bg);
            z-index: 1000;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--footer-border);
        }
        .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; z-index: 1001; }
        .logo-icon { width: 32px; height: 32px; transition: transform 0.3s ease; }
        .logo-text { font-size: 1.5rem; font-weight: 800; color: var(--logo-color); letter-spacing: -0.5px; }
        .logo-text span { color: var(--logo-accent); }

        .nav-menu { display: flex; gap: 2.25rem; align-items: center; }
        .nav-menu a { text-decoration: none; color: var(--text-main); font-weight: 600; font-size: 1.05rem; transition: color 0.2s; }
        .nav-menu a:hover { color: var(--logo-accent); }

        .nav-actions { display: flex; gap: 1.5rem; align-items: center; z-index: 1001; }

        .theme-switch-btn {
            background: none; border: 2px solid var(--text-muted); color: var(--text-muted);
            font-size: 1.1rem; cursor: pointer; padding: 6px 10px; border-radius: 8px; transition: all 0.2s;
        }
        .theme-switch-btn:hover { border-color: var(--text-main); color: var(--text-main); }
        .theme-switch-btn .fa-sun { display: none; }
        body.dark-mode .theme-switch-btn .fa-moon { display: none; }
        body.dark-mode .theme-switch-btn .fa-sun { display: block; }

        .desktop-icon { color: var(--text-main); text-decoration: none; transition: color 0.2s; }
        .desktop-icon:hover { color: var(--logo-accent); }
        .mobile-only { display: none; }

        .hamburger {
            display: none;
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s;
            z-index: 1001;
            width: 30px;
            text-align: center;
        }

        .hero { text-align: center; padding: 10rem 2rem 4rem; max-width: 1000px; margin: 0 auto; }
        .hero h1 { font-size: 4rem; font-weight: 800; line-height: 1.1; margin-bottom: 1.5rem; letter-spacing: -1.5px; min-height: 4.4rem; }
        .typewriter-cursor { display: inline-block; width: 4px; height: 3.5rem; background-color: var(--text-main); margin-left: 5px; vertical-align: middle; animation: blink 1s step-end infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .hero p#quote-box {
            font-size: 1.1rem; color: var(--text-muted); line-height: 1.6; margin-bottom: 3rem; max-width: 750px; margin-inline: auto; font-style: italic; transition: opacity 1.5s ease-in-out; opacity: 1; min-height: 3.5rem; display: flex; align-items: center; justify-content: center;
        }

        .buttons { display: flex; gap: 1.25rem; justify-content: center; margin-bottom: 4rem; align-items: center; }
        .btn-primary {
            background-color: var(--primary-btn-bg); color: var(--primary-btn-text); border: none; padding: 1.1rem 2.8rem; font-size: 1.15rem; border-radius: 50px; text-decoration: none; font-weight: 600; cursor: pointer; transition: all 0.3s ease; animation: pulse-glow 2.5s infinite;
        }
        .btn-primary:hover { opacity: 0.95; animation: none; transform: scale(1.05); box-shadow: 0 0 25px rgba(58, 198, 189, 0.6); }

        @keyframes pulse-glow {
            0% { transform: scale(1); box-shadow: 0 0 0 rgba(58, 198, 189, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 20px rgba(58, 198, 189, 0.7); }
            100% { transform: scale(1); box-shadow: 0 0 0 rgba(58, 198, 189, 0.4); }
        }

        .hero-image { margin-top: 2rem; max-width: 100%; height: auto; border-radius: 16px; box-shadow: 0 30px 60px rgba(0,0,0,0.15); border: 1px solid var(--card-border); display: block; }

        .sponsors { padding: 4rem 0 8rem; text-align: center; }
        .sponsors h2 { font-size: 3rem; font-weight: 800; margin-bottom: 3rem; }
        .sponsors-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; max-width: 1000px; margin: 0 auto; }
        .sponsor-card { background-color: var(--sponsor-bg); border: 1px solid var(--card-border); border-radius: 12px; height: 160px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 700; color: var(--text-main); transition: border-color 0.3s; }
        .sponsor-card:hover { border-color: var(--card-hover-border); }

        .footer { border-top: 1px solid var(--footer-border); padding: 2rem 0; background-color: transparent; }
        .footer-bottom { display: flex; justify-content: space-between; align-items: center; }
        .footer-bottom-brand { display: flex; align-items: center; gap: 8px; color: var(--text-muted); font-size: 0.9rem; }
        .footer-bottom-brand svg { width: 20px; height: 20px; }
        .footer-bottom-brand span { color: var(--text-main); font-weight: 600; }
        .social-icons { display: flex; gap: 1.2rem; }
        .social-icons a { color: var(--text-muted); font-size: 1.1rem; transition: color 0.2s; }
        .social-icons a:hover { color: var(--text-main); }

        @media (max-width: 900px) {
            .hero h1 { font-size: 3rem; min-height: 7rem; }
            .hero p#quote-box { min-height: 8rem; }
            .typewriter-cursor { height: 2.5rem; }
            .sponsors-grid { grid-template-columns: 1fr; }
            .navbar { padding: 1rem 5%; }
            .footer-bottom { flex-direction: column; gap: 1rem; text-align: center; }

            .hamburger { display: block; }
            .desktop-icon { display: none; }
            .mobile-only { display: block; margin-top: 1rem; }

            .nav-menu {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100vh;
                background-color: var(--mobile-menu-bg);
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                flex-direction: column;
                justify-content: center;
                align-items: center;
                padding: 2rem 0;
                gap: 2.5rem;
                transform: translateX(-100%);
                opacity: 0;
                pointer-events: none;
                transition: transform 0.4s cubic-bezier(0.77,0.2,0.05,1.0), opacity 0.3s ease;
                z-index: 1000;
            }
            .nav-menu.active {
                transform: translateX(0);
                opacity: 1;
                pointer-events: auto;
            }
            .nav-menu a { font-size: 1.5rem; }
        }
    </style>
</head>
<body class="dark-mode" id="top">

    <div class="background-blur"></div>

    <nav class="navbar">
        <a href="index.html" class="logo">
            <svg class="logo-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="28" cy="30" r="10" fill="var(--logo-accent)"/>
                <circle cx="72" cy="30" r="10" fill="var(--logo-accent)"/>
                <circle cx="50" cy="52" r="30" fill="var(--logo-accent)"/>
                <circle cx="40" cy="48" r="3.5" fill="white"/>
                <circle cx="60" cy="48" r="3.5" fill="white"/>
                <circle cx="40" cy="48" r="1.5" fill="black"/>
                <circle cx="60" cy="48" r="1.5" fill="black"/>
                <circle cx="50" cy="65" r="11" fill="white"/>
                <path d="M50 62 C48 62 47 63 47 65 C47 67 49 68 50 68 C51 68 53 67 53 65 C53 63 52 62 50 62 Z" fill="black"/>
            </svg>
            <div class="logo-text">Mordy <span>Miśka</span></div>
        </a>

        <div class="nav-menu" id="nav-menu">
            <a href="index.html">Strona główna</a>
            <a href="crackhead.html">Odkryj</a>
            <a href="#" class="mobile-only"><i class="fab fa-github"></i> GitHub</a>
        </div>

        <div class="nav-actions">
            <button class="theme-switch-btn" id="theme-switch" aria-label="Przełącz motyw">
                <i class="fas fa-moon"></i>
                <i class="fas fa-sun"></i>
            </button>
            <a href="#" class="desktop-icon"><i class="fab fa-github fa-lg"></i></a>
            <button class="hamburger" id="hamburger" aria-label="Otwórz menu">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </nav>

    <main class="hero">
        <h1>
            <span id="typewriter-text"></span><span class="typewriter-cursor"></span>
        </h1>
        <p id="quote-box">"The more GPUs you buy, The more money you save" — Jensen Huang</p>

        <div class="buttons">
            <a href="crackhead.html" class="btn btn-primary">Odkryj</a>
        </div>

        <img src="images/1.png" alt="Podgląd platformy" class="hero-image">
    </main>

    <div class="container">
        <section class="sponsors">
            <h2>Nasi Partnerzy</h2>
            <div class="sponsors-grid">
                <div class="sponsor-card">
                    <i class="fab fa-github" style="margin-right: 15px; font-size: 1.8rem;"></i> GitHub
                </div>
                <div class="sponsor-card">
                    <i class="fab fa-cloudflare" style="margin-right: 15px; color: #f38020; font-size: 1.8rem;"></i> Cloudflare
                </div>
                <div class="sponsor-card">
                    <img src="images/cachy.png" alt="CachyOS" style="margin-right: 15px; height: 1.8rem; width: auto;"> CachyOS
                </div>
            </div>
        </section>

        <footer class="footer">
            <div class="footer-bottom">
                <div class="footer-bottom-brand">
                    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" style="width: 20px; height: 20px;">
                        <circle cx="28" cy="30" r="10" fill="var(--logo-accent)"/>
                        <circle cx="72" cy="30" r="10" fill="var(--logo-accent)"/>
                        <circle cx="50" cy="52" r="30" fill="var(--logo-accent)"/>
                    </svg>
                    Made by <span>Mordy Miśka</span>
                </div>
                <div class="social-icons">
                    <a href="#" aria-label="GitHub"><i class="fab fa-github"></i></a>
                </div>
            </div>
        </footer>
    </div>

    <script>
        const themeSwitchBtn = document.getElementById('theme-switch');
        const body = document.body;

        const currentTheme = localStorage.getItem('theme');
        if (currentTheme) {
            body.classList.remove('dark-mode');
            if (currentTheme === 'dark') {
                body.classList.add('dark-mode');
            }
        }

        themeSwitchBtn.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            let theme = body.classList.contains('dark-mode') ? 'dark' : 'light';
            localStorage.setItem('theme', theme);
        });

        const hamburger = document.getElementById('hamburger');
        const navMenu = document.getElementById('nav-menu');
        const hamburgerIcon = hamburger.querySelector('i');

        hamburger.addEventListener('click', () => {
            navMenu.classList.toggle('active');
            if (navMenu.classList.contains('active')) {
                hamburgerIcon.classList.replace('fa-bars', 'fa-times');
                body.style.overflow = 'hidden';
            } else {
                hamburgerIcon.classList.replace('fa-times', 'fa-bars');
                body.style.overflow = 'auto';
            }
        });

        navMenu.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                navMenu.classList.remove('active');
                hamburgerIcon.classList.replace('fa-times', 'fa-bars');
                body.style.overflow = 'auto';
            });
        });

        const textToType = "0 zł to uczciwa cena";
        const typewriterContainer = document.getElementById('typewriter-text');
        let charIndex = 0;

        function typeWriter() {
            if (charIndex < textToType.length) {
                typewriterContainer.textContent += textToType.charAt(charIndex);
                charIndex++;
                setTimeout(typeWriter, 80);
            }
        }
        setTimeout(typeWriter, 400);

        const quotes = [
            '"The more GPUs you buy, The more money you save" — Jensen Huang',
            '"It just works" — Jensen Huang',
            '"Wydać 20 zł na Youtube Premium? Przecież w skali miesiąca to aż 20 zł" — Grzywa',
            '"Jak wygram w Jackpota to kupię Premium na Filmanku" — Misiek'
        ];
        let currentQuoteIndex = 0;
        const quoteBox = document.getElementById('quote-box');

        setInterval(() => {
            quoteBox.style.opacity = '0';
            setTimeout(() => {
                currentQuoteIndex = (currentQuoteIndex + 1) % quotes.length;
                quoteBox.textContent = quotes[currentQuoteIndex];
                quoteBox.style.opacity = '1';
            }, 1500);
        }, 7000);
    </script>
</body>
</html>
